<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; background: #0a1628; font-family: 'Segoe UI', Arial, sans-serif; }
  .wrap { width: 1200px; height: 630px; display: flex; align-items: center; justify-content: space-between; padding: 0 100px; position: relative; }
  .left { flex: 1; }
  .eyebrow { font-size: 18px; color: #5ba3d9; letter-spacing: 3px; text-transform: uppercase; font-weight: 400; margin-bottom: 24px; }
  .name { font-size: 72px; font-weight: 600; color: #ffffff; line-height: 1.05; margin-bottom: 20px; }
  .divider { width: 60px; height: 3px; background: #1e6bb8; margin-bottom: 24px; }
  .title { font-size: 26px; color: #a8c4e0; font-weight: 400; margin-bottom: 10px; }
  .tagline { font-size: 20px; color: #6b8fa8; font-style: italic; }
  .right { display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .photo { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; object-position: center top; border: 4px solid #2d5a8e; }
  .chips { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .chip { background: rgba(30,107,184,0.2); border: 1px solid rgba(30,107,184,0.4); border-radius: 20px; padding: 6px 18px; font-size: 14px; color: #a8c4e0; white-space: nowrap; }
  .bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #1e6bb8, #2d8fe0, #1e6bb8); }
</style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <div class="eyebrow">neerajagrawal.org</div>
    <div class="name">Neeraj<br>Agrawal</div>
    <div class="divider"></div>
    <div class="title">Principal Architect · Cognizant</div>
    <div class="tagline">Agentic AI & Enterprise Transformation</div>
  </div>
  <div class="right">
    <img class="photo" src="profile.JPG" alt="Neeraj Agrawal" />
    <div class="chips">
      <div class="chip">Microsoft AI</div>
      <div class="chip">Copilot Studio</div>
      <div class="chip">Azure AI Foundry</div>
      <div class="chip">D365</div>
    </div>
  </div>
  <div class="bottom-bar"></div>
</div>
</body>
</html>
